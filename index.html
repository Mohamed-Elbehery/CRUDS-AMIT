<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="Style/bootstrap.min.css" />
    <link rel="stylesheet" href="Style/style.css" />
    <title>CRUD :)</title>
  </head>
  <body>
    <div class="container">
      <div class="head">
        <h1 class="position-relative text-center mt-3">
          <span class="active">CRUDS</span> Operating System
        </h1>
      </div>
      <form class="form my-5">
        <div
          id="form-error"
          class="text-danger mb-3 fw-bold text-capitalize"
        ></div>
        <!--! Name Input -->
        <label for="name">PRODUCT NAME</label>
        <input
          type="text"
          class="form-control mb-3"
          id="name"
          onkeydown="validation()"
        />

        <!--! Price Input -->
        <label for="price">PRODUCT PRICE</label>
        <input
          type="number"
          class="form-control mb-3"
          id="price"
          onkeydown="validation()"
        />

        <!--! Category Input -->
        <label for="cat">PRODUCT CATEGORY</label>
        <input
          type="text"
          class="form-control mb-3"
          id="cat"
          onkeydown="validation()"
        />

        <!--! Description Input -->
        <label for="desc">PRODUCT DESCRIPTION</label>
        <input
          type="text"
          class="form-control mb-3"
          id="desc"
          onkeydown="validation()"
        />

        <button class="btn btn-info text-dark mb-3" id="addBtn">
          Add Product
        </button>
        <p class="text-danger text-center fw-bold" id="emp"></p>

        <input
          type="search"
          class="form-control mb-3"
          placeholder="Search by Name..."
        />
        <div
          id="success"
          class="text-success text-capitalize fw-bold fs-4"
        ></div>
        <button
          type="button"
          class="btn btn-outline-danger mx-auto my-4 d-none"
          id="deleteAllBtn"
        >
          Delete All
        </button>
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Category</th>
              <th>Description</th>
              <th>Delete</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="info"></tbody>
        </table>
      </form>
    </div>
    <script src="Script/bootstrap.bundle.min.js"></script>
    <script src="Script/script.js"></script>
  </body>
</html>
